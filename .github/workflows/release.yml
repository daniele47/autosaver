# yoinked from: https://ahmedjama.com/blog/2025/12/cross-platform-rust-pipeline-github-actions

# This automagically tests, compiles and publishes releases on github.
#
# Steps to update:
# - fix all cargo clippy warnings, as those will block a new release
# - update Cargo.toml version, and then `cargo build` to make sure Cargo.lock is correct
# - create a new git tag starting with v and then EXACTLY the same version as specified in Cargo.toml
# - potentially edit the github release to add docs and all
#
# Note:
# - dev tags are allowed, and all tags specified as vX.Y.Z-[whatever], will be compiled by github as a prelease version

name: Release Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'     # v1.2.3-beta, v1.2.3-rc.1
    branches:
      - main
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/*.yml'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      # verify tag and cargo.toml version match when trying to make a new release
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          # Extract crate version
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')

          # Extract tag version
          TAG="${GITHUB_REF_NAME}"
          TAG="${TAG#v}"      # remove leading 'v'

          # Check if this is a prerelease (contains hyphen)
          if [[ "$TAG" == *"-"* ]]; then
              echo "📦 Prerelease tag detected, skipping version check"
              echo "✅ Prerelease check passed"
              exit 0
          fi

          # For stable releases, verify version matches
          echo "Crate version: $CRATE_VERSION"
          echo "Tag version:   $TAG"

          if [ "$CRATE_VERSION" != "$TAG" ]; then
              echo "❌ Version mismatch!"
              exit 1
          fi

          echo "✅ Versions match"

  build:
    name: Build - ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    needs: verify-version
    if: ${{ always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped') }} 

    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          # x86
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_ext: ""
            use_cross: false
          # Arm
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_ext: ""
            use_cross: true
          # Armv7 (raspberry pi)
          - name: Linux ARMv7
            os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            binary_ext: ""
            use_cross: true

          # # Windows
          # # x86
          # - name: Windows x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   binary_ext: ".exe"
          #   use_cross: false
          # # Arm
          # - name: Windows ARM64
          #   os: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   binary_ext: ".exe"
          #   use_cross: false

          # # MacOS
          # # x86
          # - name: macOS x86_64
          #   os: macos-latest
          #   target: x86_64-apple-darwin
          #   binary_ext: ""
          #   use_cross: false
          # # Arm
          # - name: macOS ARM64
          #   os: macos-latest
          #   target: aarch64-apple-darwin
          #   binary_ext: ""
          #   use_cross: false

    steps:
      # checkout code and download required to compile
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install cross-compilation tool
        if: matrix.platform.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # test, assert there are no clippy warnings and finally cross compile
      - name: Test with cross (build)
        if: matrix.platform.use_cross
        run: cross test --target ${{ matrix.platform.target }}

      - name: Test with cross (release)
        if: matrix.platform.use_cross
        run: cross test --release --target ${{ matrix.platform.target }}

      - name: Strict checks before building for release
        if: matrix.platform.use_cross && startsWith(github.ref, 'refs/tags/v')
        run: cross clippy --target ${{ matrix.platform.target }} -- -D warnings

      - name: Build with cross
        if: matrix.platform.use_cross
        run: cross build --release --frozen --target ${{ matrix.platform.target }}

      # test, assert there are no clippy warnings and finally build natively
      - name: Test natively (debug)
        if: ${{ !matrix.platform.use_cross }}
        run: cargo test --target ${{ matrix.platform.target }}

      - name: Test natively (release)
        if: ${{ !matrix.platform.use_cross }}
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Strict checks before building for release
        if: ${{ !matrix.platform.use_cross && startsWith(github.ref, 'refs/tags/v') }}
        run: cargo clippy --target ${{ matrix.platform.target }} -- -D warnings

      - name: Build natively
        if: ${{ !matrix.platform.use_cross }}
        run: cargo build --release --frozen --target ${{ matrix.platform.target }}

      # package binaries
      - name: Get binary name
        id: binary_name
        shell: bash
        run: |
          BINARY_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].targets[] | select(.kind[] | contains("bin")) | .name' | head -n 1)
          echo "name=$BINARY_NAME" >> $GITHUB_OUTPUT

      - name: Package binary with completions
        shell: bash
        run: |
          TARGET_DIRNAME=".target"
          BINARY_NAME="${{ steps.binary_name.outputs.name }}"
          BINARY_PATH="${TARGET_DIRNAME}/${{ matrix.platform.target }}/release/${BINARY_NAME}${{ matrix.platform.binary_ext }}"
          ARCHIVE_NAME="${BINARY_NAME}-${{ matrix.platform.target }}"
          
          # Create package directory structure
          mkdir -p "dist/package/${BINARY_NAME}/completions"
          
          # Copy files into place
          cp "$BINARY_PATH" "dist/package/${BINARY_NAME}/${BINARY_NAME}${{ matrix.platform.binary_ext }}"
          cp autocompletions/completions/* "dist/package/${BINARY_NAME}/completions/"
          
          # Archive the directory
          cd dist/package
          if [[ "${{ matrix.platform.os }}" == "windows-latest" ]]; then
              7z a "../${ARCHIVE_NAME}.zip" "${BINARY_NAME}"
          else
              tar -czf "../${ARCHIVE_NAME}.tar.gz" "${BINARY_NAME}"
          fi
          cd ../..
          rm -rf ./dist/package

      # upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.binary_name.outputs.name }}-${{ matrix.platform.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      # download artifacts and make a release
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
