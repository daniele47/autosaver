[package]
name = "autosaver"
version = "1.1.0-dev"
edition = "2024"

[profile.release]
debug = true  # Retain debug symbols
strip = false # Don't strip symbols
opt-level = 3 # Keep optimizations but with symbols

[dependencies]
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "chrono", "local-time"] }
